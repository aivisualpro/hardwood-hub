name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Nuxt prepare generates .nuxt/ including the tsconfig references that
      # vue-tsc and ESLint both need.
      - name: Prepare Nuxt (generate .nuxt/)
        run: pnpm nuxt prepare
        env:
          # Minimum env required for nuxt prepare to succeed
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-placeholder-secret-32-chars-ok' }}
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/ci-placeholder' }}

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ── Type-check ──────────────────────────────────────────────────────────
      - name: Type-check
        run: pnpm typecheck

      # ── Unit tests ──────────────────────────────────────────────────────────
      - name: Unit tests
        run: pnpm test
        env:
          SESSION_SECRET: ci-placeholder-secret-32-characters-long
          NODE_ENV: test

      # ── Build (verify bundle succeeds) ────────────────────────────────────
      # Only run on push to main (skip on PRs to save CI minutes)
      - name: Build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm build
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-placeholder-secret-32-chars-ok' }}
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/ci-placeholder' }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || 'placeholder' }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || 'placeholder' }}
